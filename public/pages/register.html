<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Azul | Registro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../src/css/home.css">
    <link rel="stylesheet" href="../src/css/auth.css">
</head>
<body class="auth-pages">
    <!-- Overlay oscurecedor -->
    <div class="auth-overlay"></div>

    <div class="auth-container">
        <a href="/" class="back-link"><i class="fa-solid fa-arrow-left"></i> Volver al Inicio</a>
        
        <div class="auth-card">
            <div class="auth-header">
                <h2>Crea tu Cuenta</h2>
                <p>Únete a nuestra membresía exclusiva.</p>
            </div>
            
            <form id="registerForm">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="name" placeholder="Nombre Completo" required>
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="Correo Electrónico" required>
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-phone"></i>
                    <input type="tel" id="phone" placeholder="Teléfono" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
                
                <button type="submit" class="auth-btn">Crear Cuenta</button>
            </form>
            
            <div class="auth-footer">
                <p>¿Ya tienes una cuenta? <a href="InicioSesion.html">Inicia Sesión</a></p>
            </div>
        </div>
    </div>

    <!-- Vincula tu script de registro aquí -->
    <script src="../src/js/registro.js"></script>
</body>
</html>
