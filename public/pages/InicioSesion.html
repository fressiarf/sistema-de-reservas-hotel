<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Azul | Iniciar Sesión</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../src/css/home.css">
    <link rel="stylesheet" href="../src/css/auth.css">
</head>
<body class="auth-pages">
    <!-- Overlay oscurecedor para leer la tarjeta sin perder el fondo marino -->
    <div class="auth-overlay"></div>

    <div class="auth-container">
        <a href="/" class="back-link"><i class="fa-solid fa-arrow-left"></i> Volver al Inicio</a>
        
        <div class="auth-card">
            <div class="auth-header">
                <h2>Iniciar Sesión</h2>
                <p>Bienvenido de nuevo al paraíso costero.</p>
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="Correo Electrónico" required>
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
                
                <button type="submit" class="auth-btn">Ingresar</button>
            </form>
            
            <div class="auth-footer">
                <p>¿No tienes una cuenta? <a href="register.html">Regístrate aquí</a></p>
            </div>
        </div>
    </div>

    <!-- Vincula tu script de inicio de sesión aquí -->
    <script src="../src/js/inicioSesion.js"></script>
</body>
</html>
