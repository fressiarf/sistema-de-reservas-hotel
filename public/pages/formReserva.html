<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Azul | Reservas</title>
    <link rel="stylesheet" href="../src/css/formReservas.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="logo">
            <a href="/">Hotel Azul</a>
        </div>
        <ul class="nav-links">
            <li><a href="/">Inicio</a></li>
            <li><a href="/pages/reservas.html">Habitaciones y Reservas</a></li>
            <li><a href="/#comodidades">Comodidades</a></li>

        </ul>
    </nav>
    <div class="page-header">
        <h1>Formulario de Reserva</h1>
        <p>Complete el formulario para reservar su habitación</p>
    </div>
    <div class="container">
        <form id="reservaForm">
            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
            <div class="form-group">
                <label for="apellido">Apellido</label>
                <input type="text" id="apellido" name="apellido" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" name="telefono" required>
            </div>
            <div class="form-group">
                <label for="habitacion">Habitación</label>
                <select id="habitacion" name="habitacion" required>
                    <option value="">Seleccione una habitación</option>
                    <option value="Standard Ocean View">Standard Ocean View</option>
                    <option value="Suite Mar Abierto">Suite Mar Abierto</option>
                </select>
            </div>
            <div class="form-group">
                <label for="fechaEntrada">Fecha de Entrada</label>
                <input type="date" id="fechaEntrada" name="fechaEntrada" required>
            </div>
            <div class="form-group">
                <label for="fechaSalida">Fecha de Salida</label>
                <input type="date" id="fechaSalida" name="fechaSalida" required>
            </div>
            <div class="form-actions">
                <button type="button" class="btn-primary" onclick="realizarReserva()">Reservar</button>
                <button type="button" class="btn-cancel" onclick="cancelarMiReserva()">Cancelar Reserva</button>
            </div>
        </form>
    </div>
    <script src="../src/js/cliente.js"></script>
    <script src="../src/js/habitación.js"></script>
    <script src="../src/js/habitacionesData.js"></script>
    <script src="../src/js/reservas.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const habitacionParam = params.get('habitacion');
        if (habitacionParam) {
            document.getElementById('habitacion').value = habitacionParam;
        }
    </script>
</body>
</html>
